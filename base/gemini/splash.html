<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PET+ Splash Screen</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-blue: #004b9b; /* Azul escuro do coração/texto */
        --light-blue: #3282b8; /* Azul claro do "+" */
        --bg-color: #ffffff;
        --progress-bg: #e0e5ec;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #dbe3ed;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }
    .mobile-frame {
        width: 375px;
        height: 812px;
        background-color: var(--bg-color);
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }
    
    /* Background Paws Pattern */
    .bg-paws {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
        pointer-events: none;
        overflow: hidden;
    }
    .bg-paw {
        position: absolute;
        color: #eaf2fa;
        font-size: 40px;
        transform: rotate(-20deg);
    }
    /* Positioning some random paws */
    .bg-paw:nth-child(1) { top: 10%; left: 10%; font-size: 30px; transform: rotate(15deg); }
    .bg-paw:nth-child(2) { top: 25%; left: 80%; font-size: 45px; transform: rotate(-30deg); }
    .bg-paw:nth-child(3) { top: 60%; left: -5%; font-size: 50px; transform: rotate(45deg); }
    .bg-paw:nth-child(4) { top: 55%; left: 75%; font-size: 60px; transform: rotate(-10deg); }
    .bg-paw:nth-child(5) { top: 85%; left: 30%; font-size: 35px; transform: rotate(20deg); }
    .bg-paw:nth-child(6) { top: 5%; left: 60%; font-size: 25px; transform: rotate(-40deg); }

    /* Main Content */
    .content {
        position: relative;
        z-index: 2;
        text-align: center;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Logo Heart/Paw */
    .logo-container {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .fa-heart.base {
        color: var(--primary-blue);
        font-size: 110px;
        position: absolute;
    }
    .fa-paw.inner {
        color: white;
        font-size: 55px;
        position: absolute;
        margin-top: -5px; /* Adjusting center */
    }

    /* Brand Text */
    .brand-title {
        font-size: 42px;
        font-weight: 900;
        margin: 0;
        color: var(--primary-blue);
        letter-spacing: -1px;
    }
    .brand-title span {
        color: #1890ff; /* Light blue plus */
    }
    .brand-subtitle {
        font-size: 16px;
        color: #555;
        font-weight: 500;
        margin-top: 5px;
        margin-bottom: 60px;
    }

    /* Loading Area */
    .loading-text {
        font-size: 13px;
        color: #666;
        margin-bottom: 10px;
        font-weight: bold;
    }
    
    .progress-container {
        width: 60%;
        height: 10px;
        background-color: var(--progress-bg);
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-bar {
        height: 100%;
        background-color: #1890ff;
        border-radius: 10px;
        width: 0%;
        /* ANIMAÇÃO AQUI */
        animation: loadProgress 3s ease-in-out infinite;
    }

    /* Keyframes para animar a barra */
    @keyframes loadProgress {
        0% { width: 0%; }
        50% { width: 70%; }
        100% { width: 100%; }
    }

</style>
</head>
<body>

<div class="mobile-frame">
    <div class="bg-paws">
        <i class="fa-solid fa-paw bg-paw"></i>
        <i class="fa-solid fa-paw bg-paw"></i>
        <i class="fa-solid fa-paw bg-paw"></i>
        <i class="fa-solid fa-paw bg-paw"></i>
        <i class="fa-solid fa-paw bg-paw"></i>
        <i class="fa-solid fa-paw bg-paw"></i>
    </div>

    <div class="content">
        <div class="logo-container">
            <i class="fa-solid fa-heart base"></i>
            <i class="fa-solid fa-paw inner"></i>
        </div>
        
        <h1 class="brand-title">PET<span>+</span></h1>
        <p class="brand-subtitle">Cuidando de quem você<br>ama</p>
        
        <div class="loading-text">Carregando...</div>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>
</div>

</body>
</html>
