<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetCare - Especialistas Próximos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-blue: #2d6da6;
        --light-blue: #e8f0f8;
        --text-dark: #1a2b3c;
        --whatsapp-green: #4caf50;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #e0e5ec;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }
    .mobile-frame {
        width: 375px;
        height: 812px;
        background-color: #f4f7fb;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        position: relative;
    }
    
    /* Header & Filters */
    .header-section {
        background-color: var(--light-blue);
        padding: 40px 20px 15px;
        z-index: 10;
    }
    .header-section h1 {
        margin: 0 0 15px 0;
        font-size: 24px;
        color: var(--text-dark);
    }
    .filters {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-pill {
        background: white;
        border: 1px solid #b0c4de;
        padding: 8px 15px;
        border-radius: 20px;
        font-size: 14px;
        font-weight: 500;
        color: var(--text-dark);
        white-space: nowrap;
    }
    .filter-pill.active {
        background: var(--light-blue);
        border-color: var(--primary-blue);
    }

    /* Map Area */
    .map-container {
        flex: 1;
        position: relative;
        background-image: url('https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&w=600&q=80'); /* Placeholder Mapa */
        background-size: cover;
        background-position: center;
    }
    
    /* Search Bar Overlay */
    .search-overlay {
        position: absolute;
        top: 15px;
        left: 15px;
        right: 15px;
        display: flex;
        gap: 10px;
    }
    .search-box {
        flex: 1;
        background: white;
        border-radius: 10px;
        padding: 12px 15px;
        display: flex;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        font-weight: bold;
        color: var(--text-dark);
    }
    .search-box i {
        color: #666;
        margin-right: 10px;
        font-size: 18px;
    }
    .location-btn {
        background: white;
        width: 45px;
        height: 45px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        color: #666;
        font-size: 18px;
    }

    /* Pins Placeholder */
    .pin {
        position: absolute;
        width: 30px;
        height: 40px;
        background: var(--primary-blue);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: -2px 2px 5px rgba(0,0,0,0.2);
    }
    .pin i {
        transform: rotate(45deg);
        color: white;
        font-size: 12px;
    }
    .pin.red { background: #d9534f; }
    
    /* Bottom Card */
    .clinic-card {
        position: absolute;
        bottom: 15px;
        left: 15px;
        right: 15px;
        background: white;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    }
    .clinic-header {
        display: flex;
        align-items: center;
        margin-bottom: 10px;
    }
    .clinic-icon {
        width: 50px;
        height: 50px;
        background: var(--light-blue);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary-blue);
        font-size: 24px;
        margin-right: 15px;
    }
    .clinic-info h2 {
        margin: 0 0 5px 0;
        font-size: 16px;
        color: var(--text-dark);
        line-height: 1.2;
    }
    .stars { color: #f39c12; font-size: 12px; }
    .stars span { color: var(--text-dark); margin-left: 5px; font-weight: bold; }
    
    .specialist-name {
        font-size: 14px;
        color: var(--text-dark);
        margin-bottom: 15px;
    }
    
    .card-actions {
        display: flex;
        gap: 10px;
    }
    .btn {
        flex: 1;
        padding: 10px 0;
        border-radius: 8px;
        text-align: center;
        color: white;
        font-weight: bold;
        font-size: 14px;
        cursor: pointer;
    }
    .btn-whatsapp { background-color: var(--whatsapp-green); }
    .btn-gps { background-color: var(--primary-blue); }
    .btn-chat { background-color: var(--primary-blue); }

    /* Bottom Nav */
    .bottom-nav {
        background: white;
        display: flex;
        justify-content: space-around;
        padding: 15px 0;
        border-top: 1px solid #eaeaea;
        z-index: 10;
    }
    .nav-item {
        color: #99aab5;
        font-size: 24px;
    }
    .nav-item.active { color: var(--primary-blue); }

</style>
</head>
<body>

<div class="mobile-frame">
    <div class="header-section">
        <h1>Especialistas Próximos</h1>
        <div class="filters">
            <div class="filter-pill active">Dermatologia</div>
            <div class="filter-pill">Ortopedia</div>
            <div class="filter-pill">Clínica Geral</div>
        </div>
    </div>

    <div class="map-container">
        <div class="search-overlay">
            <div class="search-box">
                <i class="fa-solid fa-location-dot"></i> Taquaritinga, SP
            </div>
            <div class="location-btn">
                <i class="fa-solid fa-crosshairs"></i>
            </div>
        </div>

        <div class="pin" style="top: 30%; left: 25%;"><i class="fa-solid fa-plus"></i></div>
        <div class="pin" style="top: 45%; left: 70%;"><i class="fa-solid fa-dog"></i></div>
        <div class="pin red" style="top: 50%; left: 45%;"><i class="fa-solid fa-plus"></i></div>
        <div class="pin" style="top: 65%; left: 35%;"><i class="fa-solid fa-plus"></i></div>

        <div class="clinic-card">
            <div class="clinic-header">
                <div class="clinic-icon"><i class="fa-solid fa-paw"></i></div>
                <div class="clinic-info">
                    <h2>Clínica VetCare -<br>Unidade Jardins</h2>
                    <div class="stars">
                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                        <span>5</span>
                    </div>
                </div>
            </div>
            <div class="specialist-name">Especialist: Dra. Ana Silva</div>
            <div class="card-actions">
                <div class="btn btn-whatsapp">WhatsApp</div>
                <div class="btn btn-gps">GPS</div>
                <div class="btn btn-chat">Chat</div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i></div>
        <div class="nav-item"><i class="fa-solid fa-calendar-days"></i></div>
        <div class="nav-item"><i class="fa-solid fa-paw"></i></div>
        <div class="nav-item"><i class="fa-solid fa-user"></i></div>
    </div>
</div>

</body>
</html>
