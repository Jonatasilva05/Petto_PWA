<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petto - Login</title>
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Ícones Material Symbols Outlined -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />

    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000; /* Fundo preto caso a imagem demore a carregar */
        }

        /* Container principal com a imagem de fundo e gradiente escurecedor */
        .login-wrapper {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            /* Usando uma imagem representativa do Unsplash parecida com a sua referência */
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.3) 0%,
                rgba(0, 0, 0, 0.7) 100%
            ),
            url('https://images.unsplash.com/photo-1544568100-847a948585b9?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Limita a largura em telas maiores para simular o app */
        .login-container {
            width: 100%;
            max-width: 400px; /* Largura máxima para não esticar muito em notebooks */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            color: #ffffff;
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            letter-spacing: -1px;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Campos de Input */
        .input-group {
            position: relative;
            width: 100%;
        }

        .input-group .material-symbols-outlined {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 22px;
        }

        .input-group input {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 16px 16px 16px 48px; /* Espaço para o ícone na esquerda */
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 1);
            background: rgba(255, 255, 255, 0.05);
        }

        .icon-right {
            position: absolute;
            right: 16px;
            left: auto !important; /* Sobrescreve a regra anterior */
            cursor: pointer;
        }

        /* Botão de Entrar */
        .btn-login {
            background-color: #2b4a77; /* Azul escuro da referência */
            color: #ffffff;
            border: none;
            border-radius: 24px; /* Bordas bem arredondadas */
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            margin-top: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            background-color: #20385a;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        /* Links adicionais */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            margin-top: 24px;
        }

        .forgot-password {
            color: #60a5fa; /* Azul claro */
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .signup-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .signup-text a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .forgot-password:hover, .signup-text a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-container">
            <h1 class="logo">Petto</h1>

            <form class="login-form" action="index.html" method="GET">
                
                <!-- E-mail Input -->
                <div class="input-group">
                    <span class="material-symbols-outlined">mail</span>
                    <input type="email" placeholder="E-mail" required>
                </div>

                <!-- Senha Input -->
                <div class="input-group">
                    <span class="material-symbols-outlined">lock</span>
                    <input type="password" id="passwordInput" placeholder="Senha" required>
                    <!-- Ícone para revelar a senha -->
                    <span class="material-symbols-outlined icon-right" id="togglePassword">visibility</span>
                </div>

                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="links-container">
                <a href="#" class="forgot-password">Esqueci minha senha</a>
                
                <p class="signup-text">
                    Não tem conta? <a href="#">Cadastre-se aqui</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Script simples para fazer o ícone do olho mostrar/ocultar a senha -->
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#passwordInput');

        togglePassword.addEventListener('click', function () {
            // Alterna o tipo do input
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Alterna o ícone (olho aberto / olho cortado)
            this.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>

</body>
</html>
