<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - Prontuários</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0a0a0f',
                            panel: '#12121a',
                            border: '#232333',
                            input: '#0d0d12'
                        },
                        brand: {
                            DEFAULT: '#00d68f',
                            dark: '#009e69'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Ajuste do ícone de calendário */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.5);
            cursor: pointer;
        }

        /* Estilização da barra de rolagem (Scrollbar Customizada) */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0a0a0f; 
            border-radius: 8px;
            margin-block: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #232333; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3a3a4c;
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-300 font-sans h-screen flex overflow-hidden selection:bg-brand selection:text-black">

    <aside class="w-64 border-r border-dark-border flex flex-col shrink-0 bg-dark-bg relative z-10">
        <div class="h-16 flex items-center px-6 border-b border-dark-border gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-black">
                <i class="ph-bold ph-paw-print text-xl"></i>
            </div>
            <span class="text-white font-semibold text-lg">VetCare</span>
        </div>

        <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto custom-scrollbar">
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel">
                <i class="ph ph-squares-four text-xl"></i> Dashboard
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel">
                <i class="ph ph-users text-xl"></i> Tutores
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel">
                <i class="ph ph-paw-print text-xl"></i> Pets
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel">
                <i class="ph ph-calendar-blank text-xl"></i> Agendamento
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 bg-dark-panel text-brand rounded-lg border-l-2 border-brand">
                <i class="ph-fill ph-file-text text-xl"></i> Prontuários
                <i class="ph ph-caret-right ml-auto text-sm"></i>
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel">
                <i class="ph ph-syringe text-xl"></i> Vacinas
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 border-b border-dark-border flex items-center justify-between px-8 bg-dark-bg">
            <h1 class="text-white text-xl font-medium">Prontuários</h1>
            
            <div class="flex items-center gap-6">
                <div class="relative hidden md:block">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" placeholder="Buscar..." class="bg-dark-panel border border-dark-border rounded-lg pl-9 pr-4 py-1.5 text-sm text-white focus:outline-none focus:border-brand w-64">
                </div>
                <button class="w-8 h-8 rounded-full bg-dark-panel border border-dark-border flex items-center justify-center text-gray-400 hover:text-white">
                    <i class="ph ph-user text-lg"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div class="flex items-center gap-3">
                    <i class="ph-bold ph-file-text text-brand text-2xl"></i>
                    <h2 class="text-white text-xl font-semibold">Prontuários Eletrônicos</h2>
                    <span class="bg-dark-panel border border-dark-border text-gray-400 text-xs px-2 py-1 rounded-md">2 registros</span>
                </div>

                <button onclick="abrirModal()" class="bg-brand hover:bg-brand-dark text-black font-medium rounded-lg px-4 py-2 flex items-center gap-2 text-sm transition-colors">
                    <i class="ph ph-plus text-lg"></i> Novo Prontuário
                </button>
            </div>

            <div class="flex flex-col space-y-4">
                <div class="bg-dark-panel border border-dark-border rounded-xl p-5 hover:border-gray-700 transition-colors">
                    <div class="flex justify-between items-start mb-5">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-[#0a1a15] text-brand flex items-center justify-center shrink-0">
                                <i class="ph-fill ph-paw-print text-2xl"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <h3 class="text-white font-medium text-lg">Thor</h3>
                                    <span class="bg-[#1a1a24] text-gray-300 text-[11px] px-2.5 py-0.5 rounded border border-dark-border">Golden Retriever</span>
                                </div>
                                <div class="flex items-center gap-5 text-xs text-gray-400">
                                    <span><i class="ph ph-user"></i> Maria Silva</span>
                                    <span><i class="ph ph-calendar-blank"></i> 09/05/2024</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-dark-input rounded-lg p-3.5"><span class="text-[11px] text-gray-500 block">Queixa</span><p class="text-gray-200 text-sm">Tosse persistente</p></div>
                        <div class="bg-[#051310] border border-[#0a241c] rounded-lg p-3.5"><span class="text-[11px] text-brand block">Diagnóstico</span><p class="text-white text-sm">Traqueobronquite infecciosa canina</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="modalProntuario" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        
        <div class="bg-dark-bg border border-dark-border rounded-xl w-[700px] max-w-[95vw] shadow-2xl flex flex-col transform scale-95 transition-transform duration-300 max-h-[90vh]" id="modalContent">
            
            <div class="flex justify-between items-center p-6 pb-4 shrink-0">
                <h2 class="text-white text-xl font-medium">Novo Prontuário</h2>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <div class="p-6 pt-0 space-y-4 overflow-y-auto custom-scrollbar">
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="relative">
                        <label class="block text-white text-sm mb-1.5">Pet</label>
                        <select class="w-full bg-dark-input border border-brand rounded-lg pl-3 pr-8 py-2.5 text-sm text-gray-300 appearance-none focus:outline-none ring-1 ring-brand/20 cursor-pointer">
                            <option selected>Selecione</option>
                            <option>Thor</option>
                            <option>Luna</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-9 text-gray-500 pointer-events-none"></i>
                    </div>
                    <div class="relative">
                        <label class="block text-white text-sm mb-1.5">Veterinário</label>
                        <select class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-8 py-2.5 text-sm text-gray-400 appearance-none focus:outline-none focus:border-brand cursor-pointer">
                            <option selected>Selecione</option>
                            <option>Dr. Roberto Mendes</option>
                            <option>Dra. Fernanda Lima</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-9 text-gray-500 pointer-events-none"></i>
                    </div>
                    <div class="relative">
                        <label class="block text-white text-sm mb-1.5">Data</label>
                        <input type="text" placeholder="dd / mm / aaaa" class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-9 py-2.5 text-sm text-gray-400 focus:outline-none focus:border-brand">
                        <i class="ph ph-calendar-blank absolute right-3 top-9 text-gray-500"></i>
                    </div>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Queixa Principal</label>
                    <textarea rows="2" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Histórico</label>
                    <textarea rows="3" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Exame Clínico</label>
                    <textarea rows="3" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Diagnóstico</label>
                    <textarea rows="2" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Tratamento</label>
                    <textarea rows="2" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Prescrição</label>
                    <textarea rows="2" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Observações</label>
                    <textarea rows="2" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-brand resize-none"></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-4">
                    <button onclick="fecharModal()" class="px-5 py-2.5 rounded-lg text-sm font-medium text-white border border-dark-border hover:bg-dark-border transition-colors">
                        Cancelar
                    </button>
                    <button class="px-5 py-2.5 rounded-lg text-sm font-medium text-black bg-brand hover:bg-brand-dark transition-colors">
                        Criar Prontuário
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalProntuario');
        const modalContent = document.getElementById('modalContent');

        function abrirModal() {
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function fecharModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        modal.addEventListener('click', (e) => {
            if (e.target === modal) fecharModal();
        });
    </script>
</body>
</html>
