<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - Meu Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0a0a0f',
                            panel: '#12121a',
                            border: '#232333',
                            input: '#0d0d12'
                        },
                        brand: {
                            DEFAULT: '#00d68f',
                            dark: '#009e69'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #232333; 
            border-radius: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #3a3a4c;
        }
    </style>
</head>
<body class="bg-dark-bg text-gray-300 font-sans h-screen flex overflow-hidden selection:bg-brand selection:text-black">

    <aside class="w-64 border-r border-dark-border flex flex-col shrink-0 bg-dark-bg relative z-10">
        <div class="h-16 flex items-center px-6 border-b border-dark-border gap-3 shrink-0">
            <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-black">
                <i class="ph-bold ph-paw-print text-xl"></i>
            </div>
            <span class="text-white font-semibold text-lg">VetCare</span>
        </div>

        <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto custom-scrollbar cursor-pointer">
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-squares-four text-xl"></i> Dashboard
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-users text-xl"></i> Tutores
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-paw-print text-xl"></i> Pets
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-calendar-blank text-xl"></i> Agendamento
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-file-text text-xl"></i> Prontuários
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-syringe text-xl"></i> Vacinas
            </a>
            <hr class="border-dark-border my-2 mx-2">
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-chat-teardrop-text text-xl"></i> Mensagens
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 bg-dark-bg">
        
        <header class="h-16 border-b border-dark-border flex items-center justify-between px-8 bg-dark-bg shrink-0">
            <h1 class="text-white text-xl font-medium">Meu Perfil</h1>
            
            <div class="flex items-center gap-6">
                <div class="relative hidden md:block">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" placeholder="Buscar..." class="bg-dark-panel border border-dark-border rounded-lg pl-9 pr-4 py-1.5 text-sm focus:outline-none focus:border-brand text-white w-64 transition-colors">
                </div>
                
                <button class="text-gray-400 hover:text-white relative transition-colors">
                    <i class="ph ph-bell text-xl"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-brand rounded-full border border-dark-bg"></span>
                </button>
                <button class="w-8 h-8 rounded-full bg-brand/10 border border-brand/50 flex items-center justify-center text-brand transition-colors ring-2 ring-brand/20">
                    <i class="ph-fill ph-user text-lg"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto custom-scrollbar">
            
            <div class="flex items-center gap-3 mb-8">
                <i class="ph-bold ph-user-circle text-brand text-2xl"></i>
                <h2 class="text-white text-xl font-semibold">Configurações da Conta</h2>
            </div>

            <div class="flex flex-col lg:flex-row gap-8 max-w-6xl">
                
                <div class="w-full lg:w-1/3 flex flex-col gap-6">
                    <div class="bg-dark-panel border border-dark-border rounded-xl p-6 text-center">
                        <div class="relative inline-block mb-4 group cursor-pointer">
                            <div class="w-24 h-24 rounded-full bg-[#0a1a15] text-brand border-2 border-brand/30 flex items-center justify-center mx-auto transition-colors group-hover:border-brand">
                                <span class="text-3xl font-medium">J</span>
                            </div>
                            <div class="absolute inset-0 bg-black/50 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="ph ph-camera text-white text-xl"></i>
                            </div>
                        </div>
                        
                        <h3 class="text-white text-xl font-medium mb-1">Dr. Jhon</h3>
                        <p class="text-brand text-sm font-medium mb-4">Clínico Geral & Cirurgião</p>
                        
                        <div class="bg-dark-input rounded-lg p-3 border border-dark-border text-left space-y-3">
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500">CRMV</span>
                                <span class="text-gray-300 font-medium">45892-SP</span>
                            </div>
                            <div class="flex justify-between items-center text-sm">
                                <span class="text-gray-500">Status</span>
                                <span class="bg-brand/20 text-brand text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Ativo</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="w-full lg:w-2/3 bg-dark-panel border border-dark-border rounded-xl p-6 md:p-8">
                    
                    <form class="space-y-8">
                        
                        <div>
                            <h4 class="text-white text-base font-medium border-b border-dark-border pb-2 mb-4">Informações Pessoais</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-white text-sm mb-1.5">Nome Completo</label>
                                    <input type="text" value="Dr. Jhon" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                                <div>
                                    <label class="block text-white text-sm mb-1.5">E-mail Profissional</label>
                                    <input type="email" value="contato@vetcare.com.br" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                                <div>
                                    <label class="block text-white text-sm mb-1.5">Celular / WhatsApp</label>
                                    <input type="text" value="(16) 99999-0000" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-white text-base font-medium border-b border-dark-border pb-2 mb-4">Dados Profissionais</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-white text-sm mb-1.5">CRMV</label>
                                    <input type="text" value="45892-SP" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                                <div>
                                    <label class="block text-white text-sm mb-1.5">Especialidade Principal</label>
                                    <div class="relative">
                                        <select class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-8 py-2.5 text-sm text-white appearance-none focus:outline-none focus:border-brand cursor-pointer">
                                            <option selected>Clínica Geral</option>
                                            <option>Cirurgia</option>
                                            <option>Dermatologia</option>
                                            <option>Oftalmologia</option>
                                        </select>
                                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                                    </div>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-white text-sm mb-1.5">Mini Biografia (Visível para tutores)</label>
                                    <textarea rows="3" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors resize-none">Médico veterinário apaixonado por pequenos animais, atuando na região de Taquaritinga. Especialista em garantir o bem-estar e a saúde do seu melhor amigo.</textarea>
                                </div>
                            </div>
                        </div>

                        <div>
                            <h4 class="text-white text-base font-medium border-b border-dark-border pb-2 mb-4">Endereço de Atendimento</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div class="md:col-span-2">
                                    <label class="block text-white text-sm mb-1.5">Nome da Clínica / Hospital</label>
                                    <input type="text" value="Clínica VetCare" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                                <div>
                                    <label class="block text-white text-sm mb-1.5">CEP</label>
                                    <input type="text" value="15900-000" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-white text-sm mb-1.5">Cidade</label>
                                    <input type="text" value="Taquaritinga" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                                </div>
                                <div>
                                    <label class="block text-white text-sm mb-1.5">Estado</label>
                                    <div class="relative">
                                        <select class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-8 py-2.5 text-sm text-white appearance-none focus:outline-none focus:border-brand cursor-pointer">
                                            <option selected>São Paulo (SP)</option>
                                            <option>Minas Gerais (MG)</option>
                                            <option>Rio de Janeiro (RJ)</option>
                                        </select>
                                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex justify-end gap-3 pt-6 border-t border-dark-border mt-8">
                            <button type="button" class="px-6 py-2.5 rounded-lg text-sm font-medium text-white border border-dark-border hover:bg-dark-border transition-colors">
                                Descartar Alterações
                            </button>
                            <button type="button" class="px-6 py-2.5 rounded-lg text-sm font-medium text-black bg-brand hover:bg-brand-dark transition-colors flex items-center gap-2">
                                <i class="ph-bold ph-floppy-disk text-lg"></i> Salvar Perfil
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </main>

</body>
</html>
