<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VetCare - Pets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#0a0a0f',
                            panel: '#12121a',
                            border: '#232333',
                            input: '#0d0d12'
                        },
                        brand: {
                            DEFAULT: '#00d68f',
                            dark: '#009e69'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-bg text-gray-300 font-sans h-screen flex overflow-hidden selection:bg-brand selection:text-black">

    <aside class="w-64 border-r border-dark-border flex flex-col shrink-0 bg-dark-bg relative z-10">
        <div class="h-16 flex items-center px-6 border-b border-dark-border gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-black">
                <i class="ph-bold ph-paw-print text-xl"></i>
            </div>
            <span class="text-white font-semibold text-lg">VetCare</span>
        </div>

        <nav class="flex-1 px-3 py-6 space-y-1 overflow-y-auto cursor-pointer">
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-squares-four text-xl"></i> Dashboard
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-users text-xl"></i> Tutores
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 bg-dark-panel text-brand rounded-lg border-l-2 border-brand transition-colors">
                <i class="ph-fill ph-paw-print text-xl"></i> Pets
                <i class="ph ph-caret-right ml-auto text-sm"></i>
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-calendar-blank text-xl"></i> Agendamento
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-file-text text-xl"></i> Prontuários
            </a>
            <a class="flex items-center gap-3 px-3 py-2.5 text-gray-400 rounded-lg hover:text-white hover:bg-dark-panel transition-colors">
                <i class="ph ph-syringe text-xl"></i> Vacinas
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 border-b border-dark-border flex items-center justify-between px-8 bg-dark-bg">
            <h1 class="text-white text-xl font-medium">Pets</h1>
            
            <div class="flex items-center gap-6">
                <div class="relative hidden md:block">
                    <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" placeholder="Buscar..." class="bg-dark-panel border border-dark-border rounded-lg pl-9 pr-4 py-1.5 text-sm focus:outline-none focus:border-brand text-white w-64 transition-colors">
                </div>
                
                <button class="text-gray-400 hover:text-white relative">
                    <i class="ph ph-bell text-xl"></i>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-brand rounded-full border border-dark-bg"></span>
                </button>
                <button class="w-8 h-8 rounded-full bg-dark-panel border border-dark-border flex items-center justify-center text-gray-400 hover:text-white">
                    <i class="ph ph-user text-lg"></i>
                </button>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto">
            
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div class="flex items-center gap-3">
                    <i class="ph-bold ph-paw-print text-brand text-2xl"></i>
                    <h2 class="text-white text-xl font-semibold">Pets Cadastrados</h2>
                    <span class="bg-dark-panel border border-dark-border text-gray-400 text-xs px-2 py-1 rounded-md">6 total</span>
                </div>

                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" placeholder="Buscar pet..." class="bg-dark-panel border border-dark-border rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-brand text-white w-48 transition-colors">
                    </div>
                    
                    <div class="relative">
                        <select class="bg-dark-panel border border-dark-border rounded-lg pl-4 pr-10 py-2 text-sm text-gray-300 appearance-none focus:outline-none focus:border-brand cursor-pointer">
                            <option>Todos</option>
                            <option>Cachorro</option>
                            <option>Gato</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                    </div>

                    <button onclick="abrirModal()" class="bg-brand hover:bg-brand-dark text-black font-medium rounded-lg px-4 py-2 flex items-center gap-2 text-sm transition-colors">
                        <i class="ph ph-plus text-lg"></i> Novo Pet
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 gap-6">
                <div class="bg-dark-panel border border-dark-border rounded-xl p-5 hover:border-gray-700 transition-colors">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-brand/10 text-brand border border-brand/20 flex items-center justify-center">
                                <i class="ph-fill ph-paw-print text-2xl"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="text-white font-medium text-lg">Thor</h3>
                                    <span class="bg-blue-900/40 text-blue-400 text-[10px] uppercase font-bold px-2 py-0.5 rounded">Cachorro</span>
                                </div>
                                <p class="text-gray-400 text-sm">Golden Retriever</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button class="text-gray-500 hover:text-white transition-colors"><i class="ph ph-pencil-simple text-lg"></i></button>
                            <button class="text-red-900/80 hover:text-red-500 transition-colors"><i class="ph ph-trash text-lg"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-4 text-sm text-gray-300">
                        <div class="flex items-center gap-2"><i class="ph ph-calendar-blank text-gray-500 text-lg"></i> 6 anos</div>
                        <div class="flex items-center gap-2"><i class="ph ph-scales text-gray-500 text-lg"></i> 32 kg</div>
                    </div>
                    <div class="text-sm text-gray-400 space-y-2">
                        <p>Macho &bull; Dourado</p>
                        <p class="text-xs">Microchip: 123456789012345</p>
                    </div>
                    <hr class="border-dark-border my-4">
                    <div class="flex items-center gap-2 text-sm text-gray-300 mb-2">
                        <i class="ph ph-user text-gray-500 text-lg"></i>
                        <span>Tutor: <span class="text-white">Maria Silva</span></span>
                    </div>
                    <p class="text-xs text-gray-500 italic">Muito dócil e brincalhão</p>
                </div>
                
                </div>
        </div>
    </main>

    <div id="modalNovoPet" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        
        <div class="bg-dark-bg border border-dark-border rounded-xl w-[550px] max-w-[95vw] shadow-2xl flex flex-col transform scale-95 transition-transform duration-300" id="modalContent">
            
            <div class="flex justify-between items-center p-6 pb-4">
                <h2 class="text-white text-xl font-medium">Novo Pet</h2>
                <button onclick="fecharModal()" class="text-gray-400 hover:text-white transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>

            <div class="p-6 pt-0 space-y-5">
                
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="block text-white text-sm mb-1.5">Nome</label>
                        <input type="text" class="w-full bg-dark-input border border-brand rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none ring-1 ring-brand/30 transition-shadow">
                    </div>
                    <div class="w-1/3 relative">
                        <label class="block text-white text-sm mb-1.5">Tutor</label>
                        <select class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-8 py-2.5 text-sm text-gray-300 appearance-none focus:outline-none focus:border-brand transition-colors cursor-pointer">
                            <option>Selecione</option>
                            <option>Maria Silva</option>
                            <option>João Santos</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-9 text-gray-500 pointer-events-none"></i>
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="w-1/3 relative">
                        <label class="block text-white text-sm mb-1.5">Espécie</label>
                        <select class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-8 py-2.5 text-sm text-gray-300 appearance-none focus:outline-none focus:border-brand transition-colors cursor-pointer">
                            <option selected>Cachorro</option>
                            <option>Gato</option>
                            <option>Ave</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-9 text-gray-500 pointer-events-none"></i>
                    </div>
                    <div class="flex-1">
                        <label class="block text-white text-sm mb-1.5">Raça</label>
                        <input type="text" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="relative">
                        <label class="block text-white text-sm mb-1.5">Sexo</label>
                        <select class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-8 py-2.5 text-sm text-gray-300 appearance-none focus:outline-none focus:border-brand transition-colors cursor-pointer">
                            <option selected>Macho</option>
                            <option>Fêmea</option>
                        </select>
                        <i class="ph ph-caret-down absolute right-3 top-9 text-gray-500 pointer-events-none"></i>
                    </div>
                    <div>
                        <label class="block text-white text-sm mb-1.5">Peso (kg)</label>
                        <input type="number" step="0.1" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                    </div>
                    <div>
                        <label class="block text-white text-sm mb-1.5">Cor</label>
                        <input type="text" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                    </div>
                </div>

                <div class="flex gap-4">
                    <div class="flex-1 relative">
                        <label class="block text-white text-sm mb-1.5">Data de Nascimento</label>
                        <div class="relative">
                            <input type="text" placeholder="dd / mm / aaaa" class="w-full bg-dark-input border border-dark-border rounded-lg pl-3 pr-9 py-2.5 text-sm text-gray-300 focus:outline-none focus:border-brand transition-colors">
                            <i class="ph ph-calendar-blank absolute right-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        </div>
                    </div>
                    <div class="flex-1">
                        <label class="block text-white text-sm mb-1.5">Microchip (opcional)</label>
                        <input type="text" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors">
                    </div>
                </div>

                <div>
                    <label class="block text-white text-sm mb-1.5">Observações</label>
                    <textarea rows="3" class="w-full bg-dark-input border border-dark-border rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-brand transition-colors resize-none"></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-2">
                    <button onclick="fecharModal()" class="px-5 py-2.5 rounded-lg text-sm font-medium text-white border border-dark-border hover:bg-dark-border transition-colors">
                        Cancelar
                    </button>
                    <button class="px-5 py-2.5 rounded-lg text-sm font-medium text-black bg-brand hover:bg-brand-dark transition-colors">
                        Cadastrar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalNovoPet');
        const modalContent = document.getElementById('modalContent');

        function abrirModal() {
            // Remove o display: none
            modal.classList.remove('hidden');
            // Timeout rápido para permitir que a animação de fade/scale funcione
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function fecharModal() {
            // Adiciona as classes para animar o fechamento
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            // Aguarda a animação terminar (300ms) para esconder o elemento
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Fechar ao clicar fora do modal (no backdrop)
        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                fecharModal();
            }
        });
    </script>
</body>
</html>
