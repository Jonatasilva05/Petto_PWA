<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petto - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Oculta a barra de rolagem para um visual mais nativo no PWA */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f1115] text-gray-200 font-sans h-screen flex flex-col justify-between">

    <header class="p-6 bg-[#16191f] rounded-b-3xl shadow-lg border-b border-gray-800">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Olá, Maria!</h1>
                <p class="text-sm text-gray-400">Acompanhamento do seu pet</p>
            </div>
            <button class="w-10 h-10 rounded-full border border-gray-700 overflow-hidden">
                <img src="https://via.placeholder.com/150" alt="Foto Perfil" class="w-full h-full object-cover">
            </button>
        </div>
        
        <div class="flex items-center p-3 bg-[#1e222b] rounded-2xl border border-gray-700">
            <div class="w-14 h-14 bg-teal-500 rounded-full flex items-center justify-center text-white text-2xl mr-4 shadow-lg shadow-teal-500/30">
                <i class="fa-solid fa-dog"></i>
            </div>
            <div class="flex-1">
                <h2 class="text-lg font-bold text-white">Thor</h2>
                <p class="text-xs text-gray-400">Golden Retriever • 6 anos</p>
            </div>
            <button class="px-3 py-1 bg-[#252a36] text-teal-400 text-sm rounded-lg border border-teal-900 hover:bg-[#2c3240]">
                Trocar
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6">
        
        <section class="grid grid-cols-2 gap-4">
            <div class="bg-[#1e222b] p-4 rounded-2xl border border-gray-700 border-l-4 border-l-teal-500 flex flex-col justify-between shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-gray-400 text-sm">Vacinas</span>
                    <i class="fa-solid fa-syringe text-teal-500"></i>
                </div>
                <p class="text-xl font-bold text-white">Em dia <i class="fa-solid fa-check-circle text-sm ml-1 text-teal-500"></i></p>
            </div>

            <div class="bg-[#1e222b] p-4 rounded-2xl border border-gray-700 border-l-4 border-l-yellow-500 flex flex-col justify-between shadow-sm">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-gray-400 text-sm">Vermífugo</span>
                    <i class="fa-solid fa-clock text-yellow-500"></i>
                </div>
                <p class="text-xl font-bold text-white">14 dias</p>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white"><i class="fa-regular fa-calendar mr-2"></i> Próximos Eventos</h3>
            </div>
            
            <div class="bg-[#16191f] rounded-2xl p-4 border border-gray-800 space-y-4">
                <div class="flex items-start">
                    <div class="w-10 h-10 rounded-full bg-blue-900/30 text-blue-400 flex items-center justify-center mr-4 border border-blue-800/50">
                        <i class="fa-solid fa-stethoscope"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-medium">Consulta de Rotina</h4>
                        <p class="text-xs text-gray-400 mb-1">19/04/2026 • Em 34 dias</p>
                        <span class="inline-block px-2 py-1 bg-[#1e222b] text-xs rounded border border-gray-700">Dr. Roberto Mendes</span>
                    </div>
                </div>
                
                <hr class="border-gray-800">

                <div class="flex items-start">
                    <div class="w-10 h-10 rounded-full bg-teal-900/30 text-teal-400 flex items-center justify-center mr-4 border border-teal-800/50">
                        <i class="fa-solid fa-shield-dog"></i>
                    </div>
                    <div>
                        <h4 class="text-white font-medium">Reforço Antirrábica</h4>
                        <p class="text-xs text-gray-400">14/04/2026 • Em 39 dias</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bg-[#16191f] border-t border-gray-800 pb-safe">
        <ul class="flex justify-between items-center px-6 py-3">
            <li class="flex flex-col items-center text-teal-500">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px] font-medium">Início</span>
            </li>
            <li class="flex flex-col items-center text-gray-500 hover:text-gray-300 transition-colors">
                <i class="fa-solid fa-syringe text-xl mb-1"></i>
                <span class="text-[10px]">Vacinas</span>
            </li>
            <li class="flex flex-col items-center text-gray-500 hover:text-gray-300 transition-colors relative">
                <div class="absolute -top-8 bg-teal-500 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg shadow-teal-500/40 border-4 border-[#0f1115]">
                    <i class="fa-solid fa-plus text-xl"></i>
                </div>
                <span class="text-[10px] mt-6">Novo</span>
            </li>
            <li class="flex flex-col items-center text-gray-500 hover:text-gray-300 transition-colors">
                <i class="fa-solid fa-notes-medical text-xl mb-1"></i>
                <span class="text-[10px]">Histórico</span>
            </li>
            <li class="flex flex-col items-center text-gray-500 hover:text-gray-300 transition-colors">
                <i class="fa-regular fa-user text-xl mb-1"></i>
                <span class="text-[10px]">Perfil</span>
            </li>
        </ul>
    </nav>

</body>
</html>
