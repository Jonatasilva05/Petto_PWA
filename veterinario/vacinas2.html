<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petto - Vacinas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f1115] text-gray-200 font-sans h-screen flex flex-col justify-between">

    <header class="p-6 bg-[#16191f] shadow-md border-b border-gray-800 flex items-center justify-between">
        <div class="flex items-center">
            <button class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-white mr-3">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <h1 class="text-xl font-bold text-white">Carteira de Vacinação</h1>
        </div>
        <button class="w-8 h-8 rounded-full bg-teal-500/20 text-teal-400 flex items-center justify-center border border-teal-500/50">
            <i class="fa-solid fa-filter text-sm"></i>
        </button>
    </header>

    <main class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-6">
        
        <div class="flex space-x-3 overflow-x-auto no-scrollbar pb-2">
            <div class="min-w-[120px] bg-[#1e222b] p-3 rounded-xl border border-gray-700 flex flex-col justify-center">
                <span class="text-xs text-gray-400 mb-1">Em dia</span>
                <span class="text-xl font-bold text-teal-500">8</span>
            </div>
            <div class="min-w-[120px] bg-[#1e222b] p-3 rounded-xl border border-red-900/50 flex flex-col justify-center">
                <span class="text-xs text-gray-400 mb-1">Atrasadas</span>
                <span class="text-xl font-bold text-red-500">1</span>
            </div>
            <div class="min-w-[120px] bg-[#1e222b] p-3 rounded-xl border border-yellow-900/50 flex flex-col justify-center">
                <span class="text-xs text-gray-400 mb-1">Próximas</span>
                <span class="text-xl font-bold text-yellow-500">1</span>
            </div>
        </div>

        <div class="space-y-4">
            <div class="bg-[#1e222b] rounded-xl p-4 border border-red-900/50 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-red-500"></div>
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-bold text-white text-lg">V10 (Polivalente)</h3>
                    <span class="px-2 py-1 bg-red-500/20 text-red-400 text-[10px] font-bold rounded uppercase">Atrasada</span>
                </div>
                <div class="text-sm text-gray-400 space-y-1">
                    <p><i class="fa-solid fa-syringe w-4 text-center mr-1"></i> Aplicada: 14/01/2024</p>
                    <p class="text-red-400"><i class="fa-solid fa-clock w-4 text-center mr-1"></i> Reforço: 14/01/2025</p>
                    <p><i class="fa-solid fa-user-doctor w-4 text-center mr-1"></i> Dr. Roberto Mendes</p>
                </div>
            </div>

            <div class="bg-[#1e222b] rounded-xl p-4 border border-gray-700 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-teal-500"></div>
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-bold text-white text-lg">Antirrábica</h3>
                    <span class="px-2 py-1 bg-teal-500/20 text-teal-400 text-[10px] font-bold rounded uppercase">Completa</span>
                </div>
                <div class="text-sm text-gray-400 space-y-1">
                    <p><i class="fa-solid fa-syringe w-4 text-center mr-1"></i> Aplicada: 09/03/2025</p>
                    <p><i class="fa-solid fa-barcode w-4 text-center mr-1"></i> Lote: LOT67890</p>
                    <p><i class="fa-regular fa-calendar w-4 text-center mr-1"></i> Próxima: 14/04/2026</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
