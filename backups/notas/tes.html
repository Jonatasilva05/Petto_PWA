<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Pet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Cabeçalho -->
        <header class="header">
            <button class="btn-text cancel-color">Cancelar</button>
            <h1 class="title">Cadastro do Pet</h1>
            <div class="spacer"></div> <!-- Para centralizar o título -->
        </header>

        <!-- Barra de Progresso -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <main class="form-content">
            <!-- Data de Nascimento -->
            <div class="form-group">
                <div class="label-row">
                    <label>Data de Nascimento</label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-nao-sei-data"> Não sei a data
                    </label>
                </div>
                <div class="input-wrapper">
                    <input type="date" id="input-data" lang="pt-BR" class="form-control">
                </div>  
            </div>

            <!-- Idade Aproximada (Oculto por padrão) -->
            <div id="idade-aproximada-section" class="hidden">
                <div class="form-group">
                    <!-- ADICIONADO O ID AQUI -->
                    <label id="label-idade-principal">Idade Aproximada</label>
                    <div class="split-input">
                        <input type="number" id="input-idade" class="form-control" placeholder="Ex: 5">
                        <div class="toggle-group">
                            <button type="button" class="btn-toggle" id="btn-meses">Meses</button>
                            <button type="button" class="btn-toggle active" id="btn-anos">Anos</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <!-- ADICIONADO O ID AQUI PARA O JS CONSEGUIR MUDAR O TEXTO -->
                        <label id="label-tempo-extra">e Meses (opcional)</label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="check-nao-sei-meses"> Não sei
                        </label>
                    </div>
                    <input type="number" id="input-meses-extra" class="form-control" placeholder="Ex: 3">
                </div>
            </div>

            <!-- Sexo -->
            <div class="form-group">
                <label>Sexo</label>
                <div class="sex-toggle-group">
                    <button type="button" class="btn-sex outline" id="btn-macho">
                        <span class="icon-macho">♂</span> Macho
                    </button>
                    <button type="button" class="btn-sex outline" id="btn-femea">
                        <span class="icon-femea">♀</span> Fêmea
                    </button>
                </div>
            </div>

            <!-- Peso -->
            <div class="form-group">
                <div class="label-row">
                    <label>Peso (kg)</label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="check-nao-sei-peso"> Não sei
                    </label>
                </div>
                <input type="number" step="0.1" id="input-peso" class="form-control" placeholder="Opcional. Ex: 12.5">
            </div>

            <!-- Cor Principal -->
            <div class="form-group">
                <label>Cor Principal</label>
                <input type="text" id="input-cor" class="form-control" placeholder="Opcional. Ex: Dourado">
            </div>
        </main>

        <!-- Rodapé / Botões de Ação -->
        <footer class="footer-actions">
            <button class="btn-action btn-secondary">Voltar</button>
            <button class="btn-action btn-primary">Avançar</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
