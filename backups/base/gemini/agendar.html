<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetCare - Agendar Consulta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-blue: #1b6ca8;
        --bg-color: #eef3f9;
        --text-dark: #333;
        --text-muted: #888;
        --accent-orange: #ff9800;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #dbe3ed;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }
    .mobile-frame {
        width: 375px;
        height: 812px;
        background-color: var(--bg-color);
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
    }
    
    /* Header */
    .header {
        display: flex;
        align-items: center;
        padding: 30px 20px 20px;
        font-size: 20px;
        font-weight: bold;
        color: var(--primary-blue);
    }
    .header i {
        margin-right: 20px;
        cursor: pointer;
        font-size: 22px;
    }

    /* Content */
    .content {
        flex: 1;
        padding: 0 20px;
        overflow-y: auto;
    }

    /* Calendar Card */
    .calendar-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }
    .month-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        color: var(--text-dark);
        font-size: 16px;
        margin-bottom: 20px;
    }
    .month-header i {
        color: var(--primary-blue);
        cursor: pointer;
    }
    
    .weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        text-align: center;
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 10px;
        font-weight: 600;
    }
    
    .days-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        row-gap: 15px;
        text-align: center;
        font-size: 14px;
        color: var(--text-dark);
    }
    .day {
        position: relative;
        height: 35px;
        width: 35px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        cursor: pointer;
    }
    .day.muted {
        color: #ccc;
    }
    .day.active {
        background-color: var(--primary-blue);
        color: white;
        font-weight: bold;
    }
    
    /* Destaque para dias com consulta (Sua Sugestão) */
    .day.has-appointment::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: 50%;
        transform: translateX(-50%);
        width: 5px;
        height: 5px;
        background-color: var(--accent-orange);
        border-radius: 50%;
    }

    /* Time Slots Card */
    .time-card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .time-card h3 {
        margin: 0 0 15px 0;
        font-size: 14px;
        color: var(--text-dark);
    }
    .time-slots {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
    }
    .time-slot {
        border: 1px solid #b0c4de;
        color: var(--primary-blue);
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: bold;
        background: white;
        cursor: pointer;
    }
    .time-slot.selected {
        background-color: var(--bg-color);
        border-color: var(--primary-blue);
    }
    
    /* Confirm Button */
    .confirm-btn {
        width: 100%;
        background-color: var(--primary-blue);
        color: white;
        border: none;
        padding: 15px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(27, 108, 168, 0.3);
    }

</style>
</head>
<body>

<div class="mobile-frame">
    <div class="header">
        <i class="fa-solid fa-chevron-left"></i>
        <span>Agendar Consulta</span>
    </div>

    <div class="content">
        <div class="calendar-card">
            <div class="month-header">
                <i class="fa-solid fa-chevron-left"></i>
                <span>Outubro 2023</span>
                <i class="fa-solid fa-chevron-right"></i>
            </div>
            
            <div class="weekdays">
                <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
            </div>
            
            <div class="days-grid">
                <div class="day muted">26</div><div class="day muted">27</div><div class="day muted">28</div><div class="day muted">29</div><div class="day muted">30</div><div class="day muted">31</div><div class="day">1</div>
                <div class="day">2</div><div class="day">3</div><div class="day has-appointment">4</div><div class="day">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div>
                <div class="day">9</div><div class="day has-appointment">10</div><div class="day">11</div><div class="day active">15</div><div class="day">13</div><div class="day">14</div><div class="day">15</div>
                <div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div>
                <div class="day">23</div><div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day">29</div>
                <div class="day">30</div><div class="day">31</div><div class="day muted">1</div><div class="day muted">2</div><div class="day muted">3</div><div class="day muted">4</div><div class="day muted">5</div>
            </div>
        </div>

        <div class="time-card">
            <h3>Horários Disponíveis</h3>
            <div class="time-slots">
                <div class="time-slot selected">10:00</div>
                <div class="time-slot">11:30</div>
                <div class="time-slot">14:30</div>
                <div class="time-slot">16:00</div>
            </div>
            <button class="confirm-btn">Confirmar Agendamento</button>
        </div>
    </div>
</div>

</body>
</html>
