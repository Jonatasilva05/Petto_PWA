<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PetCare - Acompanhamento Cirurgia</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-blue: #0f4b82;
        --bg-color: #ebf3f9;
        --text-dark: #112a46;
        --text-muted: #555;
        --success-color: #2ca062;
        --warning-color: #f39c12;
        --grey-color: #aebfd0;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #dbe3ed;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }
    .mobile-frame {
        width: 375px;
        height: 812px;
        background-color: var(--bg-color);
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
    }
    
    /* Header */
    .header {
        display: flex;
        align-items: flex-start;
        padding: 30px 20px 20px;
        color: var(--primary-blue);
    }
    .header i {
        margin-right: 15px;
        margin-top: 5px;
        font-size: 20px;
        cursor: pointer;
    }
    .header h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
        color: var(--text-dark);
    }

    /* Timeline Container */
    .timeline-container {
        flex: 1;
        padding: 10px 30px;
        overflow-y: auto;
    }

    /* Timeline Items */
    .tl-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 30px;
        position: relative;
    }
    
    /* Linha conectora */
    .tl-item::after {
        content: '';
        position: absolute;
        top: 35px; /* abaixo do ícone */
        left: 16px; /* centro do ícone */
        width: 2px;
        height: 35px; /* altura da linha conectora */
        background-color: var(--grey-color);
        z-index: 1;
    }
    .tl-item:last-child::after {
        display: none; /* Remove a linha do último item */
    }
    .tl-item.completed::after {
        background-color: var(--success-color);
    }
    .tl-item.active::after {
        background-color: var(--grey-color);
    }

    /* Ícones da Timeline */
    .tl-icon {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 16px;
        margin-right: 15px;
        position: relative;
        z-index: 2;
    }
    
    .completed .tl-icon { background-color: var(--success-color); }
    .active .tl-icon { background-color: var(--warning-color); }
    .pending .tl-icon {
        background-color: transparent;
        border: 2px solid var(--grey-color);
        color: var(--grey-color);
        box-sizing: border-box;
    }

    /* Textos da Timeline */
    .tl-content {
        padding-top: 5px;
    }
    .tl-content h3 {
        margin: 0 0 3px 0;
        font-size: 16px;
        color: var(--text-dark);
    }
    .tl-content p {
        margin: 0;
        font-size: 14px;
        color: var(--text-dark);
        font-weight: 500;
    }
    
    /* Vet Card */
    .vet-card {
        background: white;
        margin: 0 20px 20px;
        border-radius: 15px;
        padding: 15px;
        display: flex;
        align-items: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    .vet-img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
        margin-right: 15px;
    }
    .vet-info h4 {
        margin: 0;
        font-size: 15px;
        color: var(--text-dark);
    }
    .vet-info p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--text-muted);
    }

    /* Bottom Nav */
    .bottom-nav {
        background: white;
        display: flex;
        justify-content: space-around;
        padding: 15px 0;
        border-top: 1px solid #eaeaea;
    }
    .nav-item {
        text-align: center;
        color: #99aab5;
        font-size: 10px;
        font-weight: bold;
    }
    .nav-item.active { color: var(--primary-blue); }
    .nav-item i {
        font-size: 20px;
        margin-bottom: 3px;
        display: block;
    }
</style>
</head>
<body>

<div class="mobile-frame">
    <div class="header">
        <i class="fa-solid fa-chevron-left"></i>
        <h1>Cirurgia de Thor -<br>Acompanhamento</h1>
    </div>

    <div class="timeline-container">
        
        <div class="tl-item completed">
            <div class="tl-icon"><i class="fa-solid fa-check"></i></div>
            <div class="tl-content">
                <h3>Admissão</h3>
                <p>08:00</p>
            </div>
        </div>

        <div class="tl-item completed">
            <div class="tl-icon"><i class="fa-solid fa-check"></i></div>
            <div class="tl-content">
                <h3>Início da Cirurgia</h3>
                <p>09:15</p>
            </div>
        </div>

        <div class="tl-item active">
            <div class="tl-icon"><i class="fa-solid fa-heart-pulse"></i></div>
            <div class="tl-content">
                <h3>Cirurgia em Andamento</h3>
                <p>Em Progresso</p>
            </div>
        </div>

        <div class="tl-item pending">
            <div class="tl-icon"><i class="fa-regular fa-clock"></i></div>
            <div class="tl-content">
                <h3>Fim Previsto</h3>
                <p>11:30</p>
            </div>
        </div>

        <div class="tl-item pending">
            <div class="tl-icon"><i class="fa-regular fa-calendar"></i></div>
            <div class="tl-content">
                <h3>Previsão de Alta</h3>
                <p>Tarde</p>
            </div>
        </div>

    </div>

    <div class="vet-card">
        <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=100&q=80" alt="Dr. André" class="vet-img">
        <div class="vet-info">
            <h4>Dr. André Martins</h4>
            <p>Veterinário Responsável</p>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active"><i class="fa-solid fa-house"></i>Home</div>
        <div class="nav-item"><i class="fa-solid fa-calendar-days"></i>Calendário</div>
        <div class="nav-item"><i class="fa-solid fa-paw"></i>Pets</div>
        <div class="nav-item"><i class="fa-solid fa-user"></i>Perfil</div>
    </div>
</div>

</body>
</html>
