<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petto - Login</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-button: #2c4a7c;
        --link-color: #5c85d6;
        --text-light: #ffffff;
        --input-border: rgba(255, 255, 255, 0.6);
        --input-bg: rgba(0, 0, 0, 0.4);
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #dbe3ed;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }
    .mobile-frame {
        width: 375px;
        height: 812px;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #000;
    }
    
    /* Background Image with Overlay */
    .bg-image {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&w=600&q=80');
        background-size: cover;
        background-position: center;
        opacity: 0.6; /* Escurece a imagem para o texto sobressair */
        z-index: 1;
    }

    /* Content Area */
    .content {
        position: relative;
        z-index: 2;
        width: 85%;
        text-align: center;
    }

    .logo {
        font-size: 56px;
        font-weight: bold;
        color: var(--text-light);
        margin-bottom: 40px;
        letter-spacing: -1px;
    }

    /* Form Inputs */
    .input-group {
        position: relative;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
    }
    .input-group i {
        position: absolute;
        left: 15px;
        color: var(--input-border);
        font-size: 18px;
    }
    .input-group .fa-eye {
        left: auto;
        right: 15px;
        cursor: pointer;
    }
    .input-group input {
        width: 100%;
        padding: 15px 15px 15px 45px;
        background-color: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 12px;
        color: var(--text-light);
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
    }
    .input-group input::placeholder {
        color: var(--input-border);
    }
    .input-group input:focus {
        border-color: #fff;
    }

    /* Login Button */
    .btn-login {
        width: 100%;
        background-color: var(--primary-button);
        color: var(--text-light);
        border: none;
        padding: 16px;
        border-radius: 25px;
        font-size: 18px;
        font-weight: 500;
        cursor: pointer;
        margin-top: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    /* Links */
    .forgot-pwd {
        display: block;
        color: var(--link-color);
        text-decoration: none;
        font-size: 14px;
        margin-bottom: 40px;
    }
    
    .signup-link {
        color: #ccc;
        font-size: 14px;
        margin-top: 60px;
    }
    .signup-link a {
        color: var(--link-color);
        text-decoration: none;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="mobile-frame">
    <div class="bg-image"></div>
    <div class="content">
        <h1 class="logo">Petto</h1>
        
        <div class="input-group">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" placeholder="E-mail">
        </div>
        
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" placeholder="Senha">
            <i class="fa-regular fa-eye"></i>
        </div>
        
        <button class="btn-login">Entrar</button>
        
        <a href="#" class="forgot-pwd">Esqueci minha senha</a>
        
        <div class="signup-link">
            Não tem conta? <a href="#">Cadastre-se aqui</a>
        </div>
    </div>
</div>

</body>
</html>
