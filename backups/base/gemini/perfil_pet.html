<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Pets - Perfil Thor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    :root {
        --primary-blue: #0056b3;
        --bg-color: #f4f7fb;
        --text-dark: #333;
        --text-muted: #777;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #e0e5ec;
        display: flex;
        justify-content: center;
        margin: 0;
        padding: 20px;
    }
    .mobile-frame {
        width: 375px;
        height: 812px;
        background-color: var(--bg-color);
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        position: relative;
    }
    /* Header */
    .header {
        background: white;
        padding: 20px 20px 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 20px;
        font-weight: bold;
        color: var(--primary-blue);
    }
    .header i { cursor: pointer; }
    .header .fa-heart { color: #ff6b6b; }
    
    /* Hero Image */
    .hero {
        width: 100%;
        height: 200px;
        position: relative;
    }
    .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    /* Info Tags */
    .info-tags {
        display: flex;
        gap: 10px;
        padding: 10px 20px;
        background: white;
        border-bottom: 1px solid #eaeaea;
        align-items: center;
    }
    .tag {
        background: #f0f4f8;
        color: var(--primary-blue);
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: bold;
    }
    .download-btn {
        margin-left: auto;
        font-size: 20px;
        color: var(--text-dark);
    }

    /* Content Area */
    .content {
        flex: 1;
        overflow-y: auto;
        padding: 15px 20px;
    }
    .section-title {
        font-size: 14px;
        font-weight: bold;
        color: var(--text-dark);
        margin-bottom: 10px;
    }
    
    /* Horizontal Scroll Cards */
    .horizontal-scroll {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding-bottom: 10px;
        scrollbar-width: none; /* Firefox */
    }
    .horizontal-scroll::-webkit-scrollbar { display: none; } /* Chrome */
    .card-compromisso {
        background: white;
        min-width: 120px;
        padding: 15px;
        border-radius: 15px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        text-align: center;
    }
    .card-compromisso i {
        font-size: 24px;
        color: #4CAF50;
        margin-bottom: 10px;
    }
    .card-compromisso .blue-icon { color: #2196F3; }
    .card-compromisso h3 {
        margin: 0;
        font-size: 12px;
        color: var(--text-dark);
    }
    .card-compromisso p {
        margin: 5px 0 0;
        font-size: 10px;
        color: var(--text-muted);
    }

    /* Grid Menu */
    .grid-menu {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 20px;
    }
    .grid-item {
        background: white;
        padding: 15px 5px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        font-size: 11px;
        font-weight: bold;
        color: var(--text-dark);
    }
    .grid-item i {
        font-size: 24px;
        margin-bottom: 8px;
        display: block;
    }
    
    /* List Menu */
    .list-menu {
        background: white;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }
    .list-item {
        padding: 15px;
        border-bottom: 1px solid #eaeaea;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
        font-weight: bold;
        color: var(--text-dark);
    }
    .list-item:last-child { border-bottom: none; }
    .list-item i.left-icon {
        color: var(--primary-blue);
        margin-right: 15px;
        width: 20px;
        text-align: center;
    }
    .list-item i.right-icon { color: #ccc; }

    /* Bottom Action Bar */
    .bottom-actions {
        display: flex;
        gap: 10px;
        padding: 15px 20px;
        background: #e0e5ec;
    }
    .bottom-btn {
        flex: 1;
        background: white;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        font-size: 12px;
        font-weight: bold;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }
    .bottom-btn i {
        display: block;
        font-size: 20px;
        margin-bottom: 5px;
    }
    .btn-blue i { color: #2196F3; }
    .btn-red i { color: #ff6b6b; color: #f44336; }

</style>
</head>
<body>

<div class="mobile-frame">
    <div class="header">
        <i class="fa-solid fa-chevron-left"></i>
        <span>Thor</span>
        <i class="fa-solid fa-heart"></i>
    </div>
    
    <div class="hero">
        <img src="https://images.unsplash.com/photo-1552053831-71594a27632d?auto=format&fit=crop&w=400&q=80" alt="Thor o Cachorro">
    </div>

    <div class="info-tags">
        <span class="tag">Peso: 32 kg</span>
        <span class="tag">Idade: 3 anos</span>
        <span class="tag">Border Collie</span>
        <i class="fa-solid fa-download download-btn"></i>
    </div>

    <div class="content">
        <div class="section-title">Próximos Compromissos</div>
        <div class="horizontal-scroll">
            <div class="card-compromisso">
                <i class="fa-solid fa-id-card blue-icon"></i>
                <h3>Consulta de Rotina</h3>
                <p>15/Out</p>
            </div>
            <div class="card-compromisso">
                <i class="fa-solid fa-bath"></i>
                <h3>Banho e Tosa</h3>
                <p>20/Out</p>
            </div>
            <div class="card-compromisso">
                <i class="fa-solid fa-bath"></i>
                <h3>Banho e Tosa</h3>
                <p>20/Out</p>
            </div>
        </div>

        <div class="grid-menu" style="margin-top: 15px;">
            <div class="grid-item">
                <i class="fa-solid fa-syringe" style="color:#0056b3;"></i> Vacinas
            </div>
            <div class="grid-item">
                <i class="fa-solid fa-pills" style="color:#e91e63;"></i> Medicamentos
            </div>
            <div class="grid-item">
                <i class="fa-solid fa-file-medical" style="color:#2196F3;"></i> Exames
            </div>
            <div class="grid-item">
                <i class="fa-solid fa-microscope" style="color:#ff9800;"></i> Exames (Outros)
            </div>
            <div class="grid-item">
                <i class="fa-solid fa-virus" style="color:#f44336;"></i> Alergias
            </div>
            <div class="grid-item">
                <div style="display:flex; justify-content:space-around;">
                    <div style="text-align:center;">
                        <i class="fa-solid fa-calendar-check" style="color:#03a9f4; font-size:18px;"></i>
                        <span style="font-size:9px; font-weight:normal;">Agendar<br>Consulta</span>
                    </div>
                    <div style="text-align:center;">
                        <i class="fa-solid fa-heart-pulse" style="color:#ff5722; font-size:18px;"></i>
                        <span style="font-size:9px; font-weight:normal;">Histórico</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="list-menu">
            <div class="list-item">
                <div><i class="fa-solid fa-clipboard-list left-icon"></i> Histórico</div>
                <i class="fa-solid fa-chevron-right right-icon"></i>
            </div>
            <div class="list-item">
                <div><i class="fa-solid fa-calendar-days left-icon"></i> Agendamentos</div>
                <i class="fa-solid fa-chevron-right right-icon"></i>
            </div>
            <div class="list-item">
                <div><i class="fa-solid fa-folder-open left-icon"></i> Arquivos</div>
                <i class="fa-solid fa-chevron-right right-icon"></i>
            </div>
        </div>
    </div>

    <div class="bottom-actions">
        <div class="bottom-btn btn-blue">
            <i class="fa-solid fa-laptop-medical"></i> Acompanhar Cirurgia
        </div>
        <div class="bottom-btn btn-red">
            <i class="fa-solid fa-truck-medical"></i> Emergência
        </div>
    </div>
</div>

</body>
</html>
