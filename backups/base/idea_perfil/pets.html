<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Pets</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 font-sans">

<div class="max-w-md mx-auto space-y-4">

  <div class="bg-white rounded-3xl p-4 flex items-center gap-4 shadow-sm">
    <div class="w-16 h-16 rounded-2xl bg-orange-100"></div>

    <div class="flex-1">
      <h2 class="font-semibold">Thor</h2>
      <p class="text-sm text-gray-500">Golden Retriever</p>
    </div>

    <button class="text-cyan-500 font-medium text-sm">
      Ver
    </button>
  </div>

  <div class="bg-white rounded-3xl p-4 flex items-center gap-4 shadow-sm">
    <div class="w-16 h-16 rounded-2xl bg-gray-200"></div>

    <div class="flex-1">
      <h2 class="font-semibold">Luna</h2>
      <p class="text-sm text-gray-500">Gato Persa</p>
    </div>

    <button class="text-cyan-500 font-medium text-sm">
      Ver
    </button>
  </div>

  <button class="w-full bg-cyan-500 text-white p-3 rounded-2xl font-medium">
    + Adicionar Pet
  </button>

</div>

</html>
