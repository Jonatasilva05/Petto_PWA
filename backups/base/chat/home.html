<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<div class="container">

  <div class="header">
    <div class="title">Olá, Jonatas</div>
    <div class="subtitle">Seus pets cadastrados</div>
  </div>

  <div class="content">

    <div class="card pet-card">
      <img class="pet-image" src="https://placehold.co/100" alt="pet">

      <div>
        <h3>Thor</h3>
        <p>Labrador • 3 anos</p>
        <div class="status success">Vacinas em dia</div>
      </div>
    </div>

    <div class="grid">

      <div class="card">
        <h3>Vacinas</h3>
        <p>Controle vacinal completo</p>
      </div>

      <div class="card">
        <h3>Consultas</h3>
        <p>Agendamentos rápidos</p>
      </div>

      <div class="card">
        <h3>Exames</h3>
        <p>Histórico veterinário</p>
      </div>

      <div class="card">
        <h3>Emergência</h3>
        <p>Atendimento 24h</p>
      </div>

    </div>

  </div>

  <div class="bottom-nav">
    <div class="nav-item">🏠 Home</div>
    <div class="nav-item">📅 Agenda</div>
    <div class="nav-item">🗺️ Mapa</div>
    <div class="nav-item">👤 Perfil</div>
  </div>

</div>
</body>
</html>
