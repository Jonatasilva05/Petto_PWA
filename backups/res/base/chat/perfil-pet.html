<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil do Pet</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">

  <div class="header center">
    <img class="pet-image" src="https://placehold.co/100" alt="pet">
    <div class="title">Thor</div>
    <div class="subtitle">Golden Retriever</div>
  </div>

  <div class="content">

    <div class="card">
      <h3>Vacinas</h3>
      <div class="status success">Em dia</div>
    </div>

    <div class="card">
      <h3>Alergias</h3>
      <div class="status warning">Pólen</div>
    </div>

    <div class="card">
      <h3>Medicamentos</h3>
      <p>Vitaminas diárias</p>
    </div>

  </div>

</div>
</body>
</html>
