<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Petto - Minha Conta</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    rel="stylesheet"
  />
</head>

<body class="bg-gray-100 font-sans text-gray-800">

  <!-- Header -->
  <header class="bg-cyan-500 text-white px-5 py-4 shadow-sm sticky top-0">
    <h1 class="text-xl font-semibold text-center">
      Minha Conta
    </h1>
  </header>

  <main class="max-w-md mx-auto px-4 py-6 space-y-5">

    <!-- Perfil -->
    <section class="bg-white rounded-3xl p-5 shadow-sm flex items-center gap-4">

      <div class="w-16 h-16 rounded-full bg-cyan-100 flex items-center justify-center text-cyan-600 text-2xl font-bold">
        J
      </div>

      <div class="flex-1">
        <h2 class="font-semibold text-lg">
          Jonatas Silva
        </h2>

        <p class="text-sm text-gray-500">
          jonatas@email.com
        </p>
      </div>

      <button class="text-cyan-600 text-sm font-medium">
        Editar
      </button>

    </section>

    <!-- Plano -->
    <section class="bg-gradient-to-r from-cyan-500 to-blue-500 rounded-3xl p-5 text-white shadow-sm">

      <div class="flex items-center justify-between">

        <div>
          <p class="text-sm opacity-90">
            Plano Atual
          </p>

          <h2 class="text-xl font-semibold mt-1">
            Plano Free
          </h2>

          <p class="text-sm mt-1 opacity-90">
            Desbloqueie recursos premium do Petto
          </p>
        </div>

        <i class="fa-solid fa-crown text-3xl opacity-90"></i>

      </div>

      <button class="mt-4 bg-white text-cyan-600 font-semibold px-4 py-2 rounded-2xl text-sm w-full">
        Assinar Plano Premium
      </button>

    </section>

    <!-- Pets -->
    <section class="bg-white rounded-3xl shadow-sm overflow-hidden">

      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-5 pt-5 pb-2">
        Pets
      </h3>

      <ul class="divide-y divide-gray-100">

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-paw text-gray-400"></i>

            <span>
              Meus Pets
            </span>
          </div>

          <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>

        </li>

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-id-card text-gray-400"></i>

            <span>
              Exportar Carteirinha PDF
            </span>
          </div>

          <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>

        </li>

      </ul>

    </section>

    <!-- Preferências -->
    <section class="bg-white rounded-3xl shadow-sm overflow-hidden">

      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-5 pt-5 pb-2">
        Preferências
      </h3>

      <ul class="divide-y divide-gray-100">

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-bell text-gray-400"></i>

            <span>
              Notificações
            </span>
          </div>

          <div class="w-10 h-6 bg-cyan-500 rounded-full flex items-center px-1">
            <div class="w-4 h-4 bg-white rounded-full ml-auto"></div>
          </div>

        </li>

      </ul>

    </section>

    <!-- Segurança -->
    <section class="bg-white rounded-3xl shadow-sm overflow-hidden">

      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider px-5 pt-5 pb-2">
        Segurança
      </h3>

      <ul class="divide-y divide-gray-100">

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-lock text-gray-400"></i>

            <span>
              Alterar Senha
            </span>
          </div>

          <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>

        </li>

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-fingerprint text-gray-400"></i>

            <span>
              Biometria
            </span>
          </div>

          <div class="w-10 h-6 bg-gray-300 rounded-full flex items-center px-1">
            <div class="w-4 h-4 bg-white rounded-full"></div>
          </div>

        </li>

      </ul>

    </section>

    <!-- Outros -->
    <section class="bg-white rounded-3xl shadow-sm overflow-hidden">

      <ul class="divide-y divide-gray-100">

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-circle-question text-gray-400"></i>

            <span>
              Central de Ajuda
            </span>
          </div>

          <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>

        </li>

        <li class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 cursor-pointer text-red-500">

          <div class="flex items-center gap-3">
            <i class="fa-solid fa-right-from-bracket"></i>

            <span class="font-medium">
              Sair da Conta
            </span>
          </div>

        </li>

      </ul>

    </section>

  </main>

</body>
</html>>
