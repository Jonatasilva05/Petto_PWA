<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verificação de Segurança - Pet</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link rel="stylesheet" href="../css/recupSenha2.css">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div class="screen">
    <div class="content">

      <div class="back-btn" style="cursor: pointer;">
        <i class="fa-solid fa-arrow-left"></i>
      </div>

      <div class="center-box">
        <h1>Verificação de Segurança</h1>
        <p class="subtitle">
          Qual o nome do seu primeiro pet?
        </p>

        <div class="input-group">
          <i class="fa-solid fa-paw"></i>
          <input type="text" placeholder="Nome do pet" />
        </div>

        <a class="forgot" style="cursor: pointer;">Esqueci a resposta</a>
        <div class="bottom">
          <button class="btn">
            Verificar
          </button>
        </div>
      </div>


    </div>
  </div>

  <script src="../../js/recuperarSenha.js"></script>

</body>
</html>
