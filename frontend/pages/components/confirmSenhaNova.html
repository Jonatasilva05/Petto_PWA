<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/confirmSenha.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

  <div class="screen">

    <div class="home-btn">
      <i class="fa-solid fa-house"></i>
    </div>

    <div class="content">

      <div class="title">
        <h1>Redefinir Senha</h1>
        <p>Digite sua nova senha abaixo.</p>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock left-icon"></i>
        <input type="password" placeholder="Nova Senha" />
        <i class="fa-solid fa-eye eye" style="cursor: pointer;"></i>
      </div>

      <div class="rules">
        <div class="rule"><div class="circle"></div>Entre 6 e 55 caracteres</div>
        <div class="rule"><div class="circle"></div>Uma letra minúscula</div>
        <div class="rule"><div class="circle"></div>Uma letra MAIÚSCULA</div>
        <div class="rule"><div class="circle"></div>Um número (0-9)</div>
      </div>

      <div class="input-group">
        <i class="fa-solid fa-lock left-icon"></i>
        <input type="password" placeholder="Confirmar Nova Senha" />
        <i class="fa-solid fa-eye eye" style="cursor: pointer;"></i>
      </div>

      <button class="btn">
        Salvar Nova Senha
      </button>

    </div>
  </div>

  <script src="../../js/recuperarSenha.js"></script>

</body>
</html>
