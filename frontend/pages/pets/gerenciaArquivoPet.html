<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petto - Arquivos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/perfilPet.css">
    <link rel="stylesheet" href="../css/gerenciaArquivoPet.css">
</head>
<body>

<div class="mobile-frame">
    <div class="header">
        <i class="fa-solid fa-chevron-left clickable" id="btn-voltar"></i>
        <span>Documentos do Pet</span>
        <i class="fa-solid fa-cloud-arrow-up clickable" id="btn-novo-arquivo"></i>
    </div>

    <div class="category-tabs">
        <button class="tab-btn active" data-categoria="todos">Todos</button>
        <button class="tab-btn" data-categoria="saude">Saúde</button>
        <button class="tab-btn" data-categoria="docs">Documentos</button>
    </div>

    <div class="content" id="lista-arquivos">
        <div class="file-item clickable">
            <div class="file-icon pdf-icon">
                <i class="fa-solid fa-file-pdf"></i>
            </div>
            <div class="file-info">
                <h4>Exame de Sangue - Rotina</h4>
                <p>12/Out/2023 • 2.4 MB</p>
            </div>
            <div class="file-actions">
                <i class="fa-solid fa-download"></i>
                <i class="fa-solid fa-trash text-danger"></i>
            </div>
        </div>
    </div>
    
    <button class="fab-btn clickable" id="fab-upload">
        <i class="fa-solid fa-plus"></i>
    </button>
</div>

<script type="module" src="../js/gerenciaArquivoPet.js"></script>
</body>
</html>
