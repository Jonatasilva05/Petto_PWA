<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petto - Acompanhamento Cirurgia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/acompanhaPet.css">
    <link rel="stylesheet" href="../css/global.css">
</head>
<body>

<div class="mobile-frame">
    <header class="header">
        <div class="header-content" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <div class="brand-info" style="display: flex; gap: 15px; align-items: center;">
                <img src="../assets/logo/iconBrancaSemFundoSemNome.png" alt="Petto Logo" class="header-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" style="width: 60px;">
                <div class="title-text">
                    <h1 style="font-size: 22px; font-weight: 700; color: white; margin: 0; line-height: 1.1;">Petto</h1>
                    <p style="font-size: 13px; color: rgba(255,255,255,0.85); margin: 2px 0 0 0;">Pets - Acompanhamento</p>
                </div>
            </div>
            
            <button id="btn-logout" class="btn-logout" style="background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 8px 15px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px);">
                <i class="fa-solid fa-door-open"></i> Sair
            </button>
        </div>
    </header>

    <main class="content">
        <div class="timeline-container">
            <div class="tl-item completed">
                <div class="tl-icon"><i class="fa-solid fa-check"></i></div>
                <div class="tl-content">
                    <h3>Admissão</h3>
                    <p>08:00</p>
                </div>
            </div>

            <div class="tl-item completed">
                <div class="tl-icon"><i class="fa-solid fa-check"></i></div>
                <div class="tl-content">
                    <h3>Início da Cirurgia</h3>
                    <p>09:15</p>
                </div>
            </div>

            <div class="tl-item active">
                <div class="tl-icon"><i class="fa-solid fa-heart-pulse"></i></div>
                <div class="tl-content">
                    <h3>Cirurgia em Andamento</h3>
                    <p>Em Progresso</p>
                </div>
            </div>

            <div class="tl-item pending">
                <div class="tl-icon"><i class="fa-regular fa-clock"></i></div>
                <div class="tl-content">
                    <h3>Fim Previsto</h3>
                    <p>11:30</p>
                </div>
            </div>

            <div class="tl-item pending">
                <div class="tl-icon"><i class="fa-regular fa-calendar"></i></div>
                <div class="tl-content">
                    <h3>Previsão de Alta</h3>
                    <p>Tarde</p>
                </div>
            </div>
        </div>

        <div class="vet-card">
            <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=100&q=80" alt="Dr. André" class="vet-img">
            <div class="vet-info">
                <h4>Dr. André Martins</h4>
                <p>Veterinário Responsável</p>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='../dashboard.html'" style="cursor:pointer;"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="window.location.href='./agendarConsulta.html'" style="cursor:pointer;"><i class="fa-solid fa-calendar-days"></i><span>Calendário</span></div>
        <div class="nav-item" onclick="window.location.href='../mapa.html'" style="cursor:pointer;"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
        <div class="nav-item active"><i class="fa-solid fa-paw"></i><span>Pets</span></div>
        <div class="nav-item" onclick="window.location.href='../perfil.html'" style="cursor:pointer;"><i class="fa-solid fa-user"></i><span>Perfil</span></div>
    </nav>
</div>

</body>
</html>
