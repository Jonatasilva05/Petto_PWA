<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petto - Exportar PDF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="mobile-frame">
    <header class="header">
      <div class="header-content" style="justify-content: flex-start; gap: 15px;">
        <i class="fa-solid fa-chevron-left" style="font-size: 20px; color: white; cursor: pointer;" onclick="window.location.href='../perfil.html'"></i>
        <h1 class="text-xl font-semibold text-white">Carteirinha PDF</h1>
      </div>
    </header>

    <main class="content space-y-5">
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 flex flex-col items-center text-center">
        <i class="fa-solid fa-file-pdf text-6xl text-cyan-500 mb-4 mt-2"></i>
        <h2 class="text-lg font-bold text-gray-800">Exportar Documentos</h2>
        <p class="text-sm text-gray-500 mt-1 mb-6">Selecione o pet para gerar a carteirinha completa com vacinas e histórico.</p>

        <div class="w-full text-left mb-6">
          <label class="text-xs font-semibold text-gray-500 ml-2">Qual pet?</label>
          <select id="petSelect" class="w-full border-2 border-gray-100 bg-gray-50 rounded-2xl p-4 outline-none focus:border-cyan-400 transition text-gray-700 font-medium mt-1">
            <option value="" disabled selected>Carregando pets...</option>
          </select>
        </div>

        <button onclick="gerarPDF()" class="w-full bg-cyan-500 text-white p-4 rounded-2xl font-bold shadow-md hover:bg-cyan-600 transition active:scale-95 flex justify-center items-center gap-2 mb-3">
          <i class="fa-solid fa-download"></i> Baixar PDF
        </button>

        <button onclick="compartilhar()" class="w-full bg-white border-2 border-cyan-500 text-cyan-500 p-4 rounded-2xl font-bold hover:bg-cyan-50 transition active:scale-95 flex justify-center items-center gap-2">
          <i class="fa-solid fa-share-nodes"></i> Compartilhar
        </button>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='../dashboard.html'"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="nav-item" onclick="window.location.href='../pets/agendarConsulta.html'"><i class="fa-solid fa-calendar-days"></i><span>Calendário</span></div>
      <div class="nav-item" onclick="window.location.href='../mapa.html'"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
      <div class="nav-item" onclick="window.location.href='../pets/acompanhaPet.html'"><i class="fa-solid fa-paw"></i><span>Pets</span></div>
      <div class="nav-item active" onclick="window.location.href='../perfil.html'"><i class="fa-solid fa-user"></i><span>Perfil</span></div>
    </nav>
  </div>

</body>
<script src="../js/exportCartPerfil.js"></script>
</html>
