<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petto - Segurança</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <div class="mobile-frame">
    <header class="header">
      <div class="header-content" style="justify-content: flex-start; gap: 15px;">
        <i class="fa-solid fa-chevron-left" style="font-size: 20px; color: white; cursor: pointer;" onclick="window.location.href='../perfil.html'"></i>
        <h1 class="text-xl font-semibold text-white">Segurança</h1>
      </div>
    </header>

    <main class="content space-y-4">
      <div class="bg-white rounded-3xl shadow-sm overflow-hidden divide-y divide-gray-100">
        
        <div class="p-5 flex items-center justify-between hover:bg-gray-50 cursor-pointer transition" onclick="abrirModalTrocaSenha()">
          <div class="flex items-center gap-3"><i class="fa-solid fa-key text-gray-500"></i><span class="font-medium text-gray-700">Alterar Senha</span></div>
          <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
        </div>

        <div class="p-5 flex items-center justify-between hover:bg-gray-50 cursor-pointer transition" onclick="toggleBiometria(this)">
          <div class="flex items-center gap-3"><i class="fa-solid fa-fingerprint text-gray-500"></i><span class="font-medium text-gray-700">Acesso por Biometria</span></div>
          <div class="w-10 h-6 bg-cyan-500 rounded-full flex items-center px-1 transition-colors duration-300 toggle-bg">
            <div class="w-4 h-4 bg-white rounded-full ml-auto transition-all duration-300 toggle-circle"></div>
          </div>
        </div>

      </div>
    </main>

    <nav class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='../dashboard.html'"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="nav-item" onclick="window.location.href='../pets/agendarConsulta.html'"><i class="fa-solid fa-calendar-days"></i><span>Calendário</span></div>
      <div class="nav-item" onclick="window.location.href='../mapa.html'"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
      <div class="nav-item" onclick="window.location.href='../pets/acompanhaPet.html'"><i class="fa-solid fa-paw"></i><span>Pets</span></div>
      <div class="nav-item active" onclick="window.location.href='../perfil.html'"><i class="fa-solid fa-user"></i><span>Perfil</span></div>
    </nav>
  </div>


</body>
<script src="../js/segurancaPerfil.js"></script>
</html>
