<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Petto - Meus Dados</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link rel="stylesheet" href="../css/dashboard.css">
  <link rel="stylesheet" href="../css/dadosPerfil.css">
</head>
<body>
  <div class="mobile-frame">
    <header class="header">
      <div class="header-content" style="justify-content: flex-start; gap: 15px;">
        <i class="fa-solid fa-chevron-left" style="font-size: 20px; color: white; cursor: pointer;" onclick="window.location.href='../perfil.html'"></i>
        <h1 class="text-xl font-semibold text-white">Meus Dados</h1>
      </div>
    </header>

    <main class="content space-y-4">
      <div class="bg-white rounded-3xl p-6 shadow-sm mb-6">
        
        <form id="formDados" class="space-y-4">
          
          <div class="flex flex-col items-center relative mb-6">
            <div class="relative group cursor-pointer" onclick="abrirBottomSheetPerfil()" title="Clique para alterar sua foto">
              <div class="w-24 h-24 rounded-full bg-cyan-100 flex items-center justify-center text-4xl font-bold text-cyan-600 shadow-inner overflow-hidden border-4 border-white" id="avatar-container">
                <img id="avatar-img" class="w-full h-full object-cover hidden" src="" alt="Foto do perfil">
                <span id="avatar-inicial"><i class="fa-solid fa-user text-cyan-400"></i></span>
              </div>
              <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center text-white opacity-0 group-hover:opacity-100 transition duration-300">
                <i class="fa-solid fa-camera text-xl"></i>
              </div>
            </div>
            <p class="text-[11px] text-gray-400 mt-2 font-medium">Toque na imagem para alterar a foto</p>
          </div>

          <div>
            <label class="text-xs font-semibold text-gray-500 ml-2">E-mail (Não pode ser alterado)</label>
            <input type="email" id="inputEmail" readonly class="w-full border-2 border-gray-100 bg-gray-100 text-gray-400 rounded-2xl p-4 outline-none cursor-not-allowed font-medium mt-1">
          </div>

          <div>
            <label class="text-xs font-semibold text-gray-500 ml-2">Nome Completo</label>
            <input type="text" id="inputNome" placeholder="Seu nome" required disabled class="w-full border-2 border-gray-100 bg-gray-100 text-gray-400 rounded-2xl p-4 outline-none focus:border-cyan-400 transition font-medium mt-1 cursor-not-allowed">
          </div>

          <div>
            <label class="text-xs font-semibold text-gray-500 ml-2">Telefone / Celular</label>
            <input type="tel" id="inputTel" placeholder="(00) 00000-0000" disabled class="w-full border-2 border-gray-100 bg-gray-100 text-gray-400 rounded-2xl p-4 outline-none focus:border-cyan-400 transition font-medium mt-1 cursor-not-allowed">
          </div>

          <div>
            <label class="text-xs font-semibold text-gray-500 ml-2">CPF</label>
            <input type="text" id="inputCpf" placeholder="000.000.000-00" disabled class="w-full border-2 border-gray-100 bg-gray-100 text-gray-400 rounded-2xl p-4 outline-none focus:border-cyan-400 transition font-medium mt-1 cursor-not-allowed">
          </div>

          <div>
            <label class="text-xs font-semibold text-gray-500 ml-2">Endereço Residencial</label>
            <input type="text" id="inputEndereco" placeholder="Rua, número, bairro - Cidade/UF" disabled class="w-full border-2 border-gray-100 bg-gray-100 text-gray-400 rounded-2xl p-4 outline-none focus:border-cyan-400 transition font-medium mt-1 cursor-not-allowed">
          </div>
          
          <div class="pt-2">
            <button type="button" id="btnEditar" class="w-full bg-amber-500 text-white p-4 rounded-2xl font-bold shadow-md hover:bg-amber-600 transition active:scale-95 flex justify-center items-center gap-2">
              <i class="fa-solid fa-pen-to-square"></i> Editar Informações
            </button>

            <button type="submit" id="btnSalvar" class="w-full bg-cyan-500 text-white p-4 rounded-2xl font-bold shadow-md hover:bg-cyan-600 transition active:scale-95 hidden justify-center items-center gap-2">
              <i class="fa-solid fa-floppy-disk"></i> Salvar Alterações
            </button>
          </div>
        </form>
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="nav-item" onclick="window.location.href='../dashboard.html'"><i class="fa-solid fa-house"></i><span>Home</span></div>
      <div class="nav-item" onclick="window.location.href='../pets/agendarConsulta.html'"><i class="fa-solid fa-calendar-days"></i><span>Calendário</span></div>
      <div class="nav-item" onclick="window.location.href='../mapa.html'"><i class="fa-solid fa-map-location-dot"></i><span>Mapa</span></div>
      <div class="nav-item" onclick="window.location.href='../pets/acompanhaPet.html'"><i class="fa-solid fa-paw"></i><span>Pets</span></div>
      <div class="nav-item active" onclick="window.location.href='../perfil.html'"><i class="fa-solid fa-user"></i><span>Perfil</span></div>
    </nav>
  </div>

  <div class="overlay" id="overlayPerfil" onclick="fecharBottomSheetPerfil()"></div>

  <div class="bottom-sheet" id="sheetFotoPerfil">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title" style="color: white; font-weight: 600; text-align: center; margin-bottom: 15px;">Foto de Perfil</h3>
    <div style="display: flex; flex-direction: column; gap: 15px; padding: 0 20px 20px 20px;">
      <button type="button" class="btn-primary" style="border-radius: 16px; padding: 15px; background: #06b6d4; color: white; font-weight: 600;" onclick="document.getElementById('input-camera-perfil').click()">
        <i class="fa-solid fa-camera"></i> Tirar Foto Agora
      </button>
      <button type="button" class="btn-secondary" style="border-radius: 16px; padding: 15px; background: #333; color: white; font-weight: 600;" onclick="document.getElementById('input-gallery-perfil').click()">
        <i class="fa-regular fa-image"></i> Escolher da Galeria
      </button>
    </div>
    <input type="file" id="input-camera-perfil" accept="image/*" capture="environment" hidden />
    <input type="file" id="input-gallery-perfil" accept="image/*" hidden />
  </div>

</body>
<script src="../js/dadosPerfil.js"></script>
</html>
