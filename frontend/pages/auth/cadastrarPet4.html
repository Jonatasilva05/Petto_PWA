<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medicação Pet - Etapa 4</title>
  <link rel="stylesheet" href="../css/cadastrarPet4.css">
</head>
<body>
  <div class="container">
    <h2>O pet já tomou ou ainda toma alguma medicação?</h2>
    <div class="options">
      <button class="btn-option">Sim</button>
      <button class="btn-option">Não</button>
      <button class="btn-option active">Não Sei</button>
    </div>

    <button class="btn-dropdown" id="toggleDropdown" style="display: flex;">⊕ Selecionar Medicações</button>

    <div class="dropdown" id="dropdown"></div>

    <div class="medicacoes-container" id="medicacoesContainer"></div>

    <div class="footer">
      <button class="btn-footer voltar" id="btn-back">Voltar</button>
      <button class="btn-footer finalizar" id="btn-finish">Finalizar Cadastro</button>
    </div>
  </div>

  <script type="module" src="../js/cadastrarPet4.js"></script>
</body>
</html>
