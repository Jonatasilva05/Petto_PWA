<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <title>Petto - Cadastro do Pet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/cadastrarPet1.css" />
    <style>
        .photo-upload-container { display: flex; justify-content: center; margin-bottom: 25px; }
        .photo-upload-circle { width: 120px; height: 120px; border-radius: 50%; background: #1e1e1e; border: 2px dashed #1565C0; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; }
        .photo-upload-circle i { font-size: 30px; color: #1565C0; margin-bottom: 5px; }
        .photo-upload-circle span { font-size: 12px; color: #aaa; text-align: center; }
    </style>
  </head>

  <body>
    <div class="mobile-frame">
      <header class="top-header">
        <div class="header-content">
          <button type="button" class="btn-cancelar" onclick="window.location.href = '../dashboard.html'">
            <i class="fa-solid fa-xmark"></i> Cancelar
          </button>
          <h1 class="header-title">Cadastro Rápido</h1>
        </div>
      </header>

      <main class="steps-container" style="padding-top: 20px;">
        <section class="step-section active" id="step-1">
          
          <div class="photo-upload-container">
            <div class="photo-upload-circle" onclick="window.openBottomSheet('sheet-foto')">
                <img id="pet-photo-preview" src="" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                <div id="photo-placeholder" style="display: flex; flex-direction: column; align-items: center;">
                    <i class="fa-solid fa-camera"></i>
                    <span>Adicionar<br>Foto</span>
                </div>
            </div>
          </div>

          <div class="input-group">
            <label for="pet-nome">Nome do Pet</label>
            <input type="text" id="pet-nome" placeholder="Ex: Bob" autocomplete="off" />
          </div>

          <div class="input-group">
            <label>Espécie</label>
            <button type="button" class="custom-select" onclick="window.openBottomSheet('sheet-especie')">
              <span id="txt-especie">Selecione...</span>
              <i class="fa-solid fa-chevron-down"></i>
            </button>
          </div>

          <div class="input-group">
            <label>Raça</label>
            <button type="button" class="custom-select" onclick="window.openBottomSheet('sheet-raca')">
              <span id="txt-raca">Selecione...</span>
              <i class="fa-solid fa-chevron-down"></i>
            </button>
          </div>
        </section>
      </main>

      <footer class="bottom-nav-buttons">
        <button type="button" class="btn-primary" id="btn-next" style="width: 100%;">
          Avançar
        </button>
      </footer>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="bottom-sheet" id="sheet-foto">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">Adicionar Foto</h3>
      <div style="display: flex; flex-direction: column; gap: 15px; padding: 0 20px 20px 20px;">
        <button type="button" class="btn-primary" onclick="document.getElementById('input-camera').click()" style="padding: 15px; border-radius: 12px; font-size: 16px; border: none; background: #1565C0; color: white;">
          <i class="fa-solid fa-camera"></i> Tirar Foto
        </button>
        <button type="button" class="btn-secondary" onclick="document.getElementById('input-gallery').click()" style="padding: 15px; border-radius: 12px; font-size: 16px; border: 1px solid #444; background: #333; color: white;">
          <i class="fa-regular fa-image"></i> Escolher da Galeria
        </button>
      </div>
      <input type="file" id="input-camera" accept="image/*" capture="environment" hidden />
      <input type="file" id="input-gallery" accept="image/*" hidden />
    </div>

    <div class="bottom-sheet" id="sheet-especie">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">Selecione a Espécie</h3>
      <input type="text" class="sheet-search" placeholder="Pesquisar espécie..." />
      <ul class="sheet-list" id="lista-especies"></ul>
      <button type="button" class="btn-primary sheet-confirm" onclick="window.closeBottomSheet()">Fechar</button>
    </div>

    <div class="bottom-sheet" id="sheet-raca">
      <div class="sheet-handle"></div>
      <h3 class="sheet-title">Selecione a Raça</h3>
      <input type="text" class="sheet-search" placeholder="Pesquisar raça..." />
      <ul class="sheet-list" id="lista-racas">
        <li><span style="color:#888;">Selecione uma espécie primeiro</span></li>
      </ul>
      <button type="button" class="btn-primary sheet-confirm" onclick="window.closeBottomSheet()">Fechar</button>
    </div>

    <script type="module" src="../js/cadastrarPet1.js"></script>
  </body>
</html>
