<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petto - Criar Conta</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/registroTutor.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div id="toast-container"></div>

<div id="app">
    <section id="register-view" class="view-section active">
        <button type="button" class="top-back-button" onclick="window.location.href='../../index.html'" title="Voltar para Login">
            <i class="fa-solid fa-door-open"></i>
        </button>

        <h1 class="logo-small">Petto</h1>
        <h2 class="section-title">Crie sua conta</h2>

        <div class="scroll-container">
            <div class="input-wrapper">
                <input type="text" id="reg-nome" placeholder="Nome Completo">
            </div>

            <div class="input-wrapper">
                <input type="email" id="reg-email" placeholder="E-mail">
            </div>
            <small id="email-hint" style="display: block; text-align: left; margin-top: -10px; margin-bottom: 10px; margin-left: 10px; font-size: 12px; font-weight: bold;"></small>

            <div class="input-wrapper">
                <input type="password" id="reg-password" placeholder="Senha">
                <span class="toggle-password" id="toggle-reg-pass">👁️</span>
            </div>

            <div class="password-strength">
                <div class="strength-bars">
                    <div id="bar-1" class="bar"></div>
                    <div id="bar-2" class="bar"></div>
                    <div id="bar-3" class="bar"></div>
                </div>
                <div class="strength-reqs" style="color: white; font-size: 12px; display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
                    <span id="req-len">❌ Entre 6 e 55 caracteres</span>
                    <span id="req-up">❌ Uma letra maiúscula</span>
                    <span id="req-low">❌ Uma letra minúscula</span>
                    <span id="req-num">❌ Um número</span>
                    <span id="req-spc">❌ Um caractere especial</span>
                </div>
            </div>

            <div class="input-wrapper">
                <input type="text" id="reg-pet-primario" placeholder="Nome do seu primeiro Pet">
            </div>

            <div class="input-wrapper">
                <input type="text" id="reg-cor-favorita" placeholder="Sua cor favorita">
            </div>

            <div class="checkbox-wrapper">
                <input type="checkbox" id="reg-is-vet">
                <label for="reg-is-vet">Eu sou Veterinário(a)</label>
            </div>

            <div id="vet-fields" class="hidden-fields">
                <div class="input-wrapper">
                    <input type="text" id="reg-cpf" placeholder="CPF">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-crmv" placeholder="CRMV (Ex: 12345-SP)">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-clinica" placeholder="Nome da Clínica">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-cep" placeholder="CEP da Clínica">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-endereco" placeholder="Endereço" readonly>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-bairro" placeholder="Bairro" readonly>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-numero" placeholder="Número">
                </div>
            </div>
        </div>

        <button id="btn-register-final" class="btn-primary">Registrar</button>

        </section>
</div>

<script type="module" src="../../js/app.js"></script>
</body>
</html>
