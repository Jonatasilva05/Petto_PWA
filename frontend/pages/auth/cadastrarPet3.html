<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vacinação Pet - Etapa 3</title>
  <link rel="stylesheet" href="../css/cadastrarPet3.css">
</head>
<body>
  <div class="container">
    <h2>O pet já foi vacinado?</h2>
    <div class="options">
      <button class="btn-option active">Sim</button>
      <button class="btn-option">Não</button>
      <button class="btn-option">Não Sei</button>
    </div>

    <button class="btn-vacina" id="toggleDropdown">⊕ Selecionar Vacinas</button>

    <div class="dropdown" id="dropdown"></div>

    <div class="vacinas-container" id="vacinasContainer"></div>

    <div class="footer">
      <button class="btn-footer voltar" id="btn-back">Voltar</button>
      <button class="btn-footer avancar" id="btn-next">Avançar</button>
    </div>
  </div>

  <script type="module" src="../js/cadastrarPet3.js"></script>
</body>
</html>
