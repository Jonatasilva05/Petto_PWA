<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Petto - Carteira de Vacinas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../css/vacinasPet.css">
</head>
<body>

<div class="mobile-frame">
    <div class="header">
        <i class="fa-solid fa-chevron-left clickable" id="btn-voltar"></i>
        <span>Carteira de Vacinas</span>
        <i class="fa-solid fa-plus clickable" id="btn-adicionar-vacina"></i>
    </div>
    
    <div class="filters-container">
        <div class="filters">
            <div class="filter-tab active-outline" data-filter="Tudo">Tudo</div>
            <div class="filter-tab" data-filter="Aplicadas">Aplicadas</div>
            <div class="filter-tab" data-filter="Atrasadas">Atrasadas</div>
            <div class="filter-tab" data-filter="Futuras">Futuras</div>
        </div>
    </div>

    <div class="list-container" id="lista-vacinas">
        <p style="text-align:center; margin-top:30px; color: var(--text-muted);">Carregando vacinas...</p>
    </div>
</div>

<script type="module" src="../js/vacinasPet.js"></script>
</body>
</html>
