<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>Petto - Acesso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div id="toast-container"></div>

    <div id="app">
        <section id="login-view" class="view-section active">
            <h1 class="logo">Petto</h1>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="login-email" placeholder="E-mail">
                </div>
                
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="Senha">
                    <span class="toggle-password" id="toggle-login-pass">👁️</span>
                </div>
            </div>
            
            <button id="btn-login" class="btn-primary">Entrar</button>
            <a href="./pages/components/recupSenha1.html" class="link-text">Esqueci minha senha</a>
            
            <p class="bottom-text">Não tem conta? 
                <a href="./pages/auth/registroTutor.html" id="link-go-register" class="link-text-cadastro">
                    Cadastre-se aqui
                </a>
            </p>
        </section>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
