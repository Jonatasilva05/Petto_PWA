<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="./manifest.json">
    <title>Petto - Acesso</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="toast-container"></div>

    <div id="app">
        <section id="login-view" class="view-section active">
            <h1 class="logo">Petto</h1>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <span class="input-icon">📧</span>
                    <input type="email" id="login-email" placeholder="E-mail">
                </div>
                
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="login-password" placeholder="Senha">
                    <span class="toggle-password" id="toggle-login-pass">👁️</span>
                </div>
            </div>
            
            <button id="btn-login" class="btn-primary">Entrar</button>
            <a href="#" class="link-text">Esqueci minha senha</a>
            
            <p class="bottom-text">Não tem conta? <a href="#" id="link-go-register" class="link-text">Cadastre-se aqui</a></p>
        </section>

        <section id="register-view" class="view-section hidden">
            <h1 class="logo-small">Petto</h1>
            <h2 class="section-title">Crie sua conta</h2>
            
            <div class="scroll-container">
                <div class="input-wrapper">
                    <input type="text" id="reg-nome" placeholder="Nome Completo">
                </div>
                <div class="input-wrapper">
                    <input type="email" id="reg-email" placeholder="E-mail">
                    <small id="email-hint"></small>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="reg-password" placeholder="Senha">
                    <span class="toggle-password" id="toggle-reg-pass">👁️</span>
                </div>
                
                <div class="password-strength">
                    <div class="strength-bars">
                        <div id="bar-1" class="bar"></div>
                        <div id="bar-2" class="bar"></div>
                        <div id="bar-3" class="bar"></div>
                    </div>
                    <div class="strength-reqs">
                        <span id="req-len">❌ 6-55 chars</span>
                        <span id="req-up">❌ Maiúscula</span>
                        <span id="req-low">❌ Minúscula</span>
                        <span id="req-num">❌ Número</span>
                        <span id="req-spc">❌ Especial</span>
                    </div>
                </div>

                <div class="checkbox-wrapper">
                    <input type="checkbox" id="reg-is-vet">
                    <label for="reg-is-vet">Eu sou Veterinário(a)</label>
                </div>

                <div id="vet-fields" class="hidden-fields">
                    <div class="input-wrapper"><input type="text" id="reg-cpf" placeholder="CPF"></div>
                    <div class="input-wrapper"><input type="text" id="reg-crmv" placeholder="CRMV (ex: 12345-SP)"></div>
                    <div class="input-wrapper"><input type="text" id="reg-clinica" placeholder="Nome da Clínica"></div>
                    <div class="input-wrapper"><input type="text" id="reg-experiencia" placeholder="Anos de Experiência"></div>
                    <div class="input-wrapper"><input type="text" id="reg-cep" placeholder="CEP da Clínica"></div>
                    <div class="input-wrapper"><input type="text" id="reg-endereco" placeholder="Endereço" readonly></div>
                    <div class="input-wrapper"><input type="text" id="reg-bairro" placeholder="Bairro" readonly></div>
                    <div class="input-wrapper"><input type="text" id="reg-numero" placeholder="Número"></div>
                </div>

                <div class="input-wrapper">
                    <input type="text" id="reg-pet-primario" placeholder="Nome do seu primeiro Pet">
                </div>
                <div class="input-wrapper">
                    <input type="text" id="reg-cor-favorita" placeholder="Sua cor favorita">
                </div>
            </div>

            <button id="btn-register-final" class="btn-primary">Registrar</button>
            <p class="bottom-text">Já tem conta? <a href="#" id="link-go-login" class="link-text">Entrar</a></p>
        </section>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
